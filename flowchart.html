<html>

    <head>
        <title>Nextflow Cytoscape.js with Dagre</title>

        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1, maximum-scale=1">

        <script type="text/javascript">
        var prot = (("https:" == document.location.protocol) ? "https://" : "http://");
        document.write(unescape("%3Cscript src='" + prot + "code.jquery.com/jquery-2.0.3.min.js' type='text/javascript' %3E%3C/script%3E"));
        document.write(unescape("%3Cscript src='" + prot + "cdnjs.cloudflare.com/ajax/libs/cytoscape/2.6.12/cytoscape.min.js' type='text/javascript' %3E%3C/script%3E"));
        document.write(unescape("%3Cscript src='" + prot + "cdn.rawgit.com/cpettitt/dagre/v0.7.4/dist/dagre.min.js' type='text/javascript' %3E%3C/script%3E"));
        document.write(unescape("%3Cscript src='" + prot + "cdn.rawgit.com/cytoscape/cytoscape.js-dagre/1.1.2/cytoscape-dagre.js' type='text/javascript' %3E%3C/script%3E"));
        </script>

        <style>
            body {
                font-family: helvetica;
                font-size: 14px;
            }

            #cy {
                width: 100%;
                height: 100%;
                position: absolute;
                left: 0;
                top: 0;
                z-index: 999;
            }

            h1 {
                opacity: 0.5;
                font-size: 1em;
            }
        </style>

        <script>
            $(function(){
                var cy = window.cy = cytoscape({
                    container: document.getElementById('cy'),
                    boxSelectionEnabled: false,
                    autounselectify: true,

                    layout: {
                        name: 'dagre'
                    },

                    style: cytoscape.stylesheet()
                        .selector( 'node')
                            .css({
                                'width': 10,
                                'height': 10,
                                'content': 'data(label)',
                                'text-valign': 'center',
                                'text-halign': 'center',
                                'text-opacity': 0.5,
                            })
                        .selector('node.PROCESS')
                            .css({
                                'width': 100,
                                'height': 50,
                                'text-opacity': 0.9,
                                'background-color': '#009911'
                            })
                        .selector('node.OPERATOR')
                            .css({
                                'background-color': '#11479e',
                                'text-halign': 'right',
                            })
                        .selector('node.ORIGIN')
                            .css({
                                'background-color': '#999999',
                                'text-halign': 'right',
                            })
                        .selector('node.TERMINATION')
                            .css({
                                'background-color': '#999999',
                                'text-halign': 'right',
                            })
                        .selector('edge')
                            .css({
                                'content': 'data(label)',
                                'text-opacity': 0.5,
                                'width': 4,
                                'target-arrow-shape': 'triangle',
                                'line-color': '#9dbaea',
                                'target-arrow-color': '#9dbaea'
                            }),

elements: {
nodes: [
{ data: { id: 'p0'}, classes: 'ORIGIN' },
{ data: { id: 'p1', label: 'MAKE_META_FILE'}, classes: 'PROCESS' },
{ data: { id: 'p2', label: 'splitCsv'}, classes: 'OPERATOR' },
{ data: { id: 'p3', label: 'map'}, classes: 'OPERATOR' },
{ data: { id: 'p4', label: 'FASTP'}, classes: 'PROCESS' },
{ data: { id: 'p5'}, classes: 'NODE' },
{ data: { id: 'p6', label: 'collect'}, classes: 'OPERATOR' },
{ data: { id: 'p7'}, classes: 'NODE' },
{ data: { id: 'p8'}, classes: 'ORIGIN' },
{ data: { id: 'p9', label: 'MAKE_BWA_INDEX'}, classes: 'PROCESS' },
{ data: { id: 'p10', label: 'BWA_ALIGN'}, classes: 'PROCESS' },
{ data: { id: 'p11', label: 'collect'}, classes: 'OPERATOR' },
{ data: { id: 'p12', label: 'collect'}, classes: 'OPERATOR' },
{ data: { id: 'p13', label: 'collect'}, classes: 'OPERATOR' },
{ data: { id: 'p14', label: 'flatten'}, classes: 'OPERATOR' },
{ data: { id: 'p15', label: 'flatten'}, classes: 'OPERATOR' },
{ data: { id: 'p16', label: 'BAM2BIGWIG'}, classes: 'PROCESS' },
{ data: { id: 'p17'}, classes: 'NODE' },
{ data: { id: 'p18'}, classes: 'ORIGIN' },
{ data: { id: 'p19', label: 'COUNT_READS'}, classes: 'PROCESS' },
{ data: { id: 'p20'}, classes: 'NODE' },
{ data: { id: 'p21'}, classes: 'NODE' },
{ data: { id: 'p22'}, classes: 'NODE' },
{ data: { id: 'p23'}, classes: 'NODE' },
{ data: { id: 'p24', label: 'TMM_NORMALISE_COUNTS'}, classes: 'PROCESS' },
{ data: { id: 'p25'}, classes: 'NODE' },
{ data: { id: 'p26', label: 'PCA_SAMPLES'}, classes: 'PROCESS' },
{ data: { id: 'p27'}, classes: 'NODE' },
{ data: { id: 'p28'}, classes: 'ORIGIN' },
{ data: { id: 'p29'}, classes: 'ORIGIN' },
{ data: { id: 'p30'}, classes: 'ORIGIN' },
{ data: { id: 'p31', label: 'DIFF_EXPRESSION'}, classes: 'PROCESS' },
{ data: { id: 'p32'}, classes: 'NODE' },
{ data: { id: 'p33', label: 'collect'}, classes: 'OPERATOR' },
{ data: { id: 'p34'}, classes: 'NODE' },
],
edges: [
{ data: { source: 'p0', target: 'p1', label: 'sample_file' } },
{ data: { source: 'p1', target: 'p2', label: 'ch_metadata' } },
{ data: { source: 'p2', target: 'p3'} },
{ data: { source: 'p3', target: 'p4', label: 'ch_raw_reads_fastp' } },
{ data: { source: 'p4', target: 'p10', label: 'ch_trimmed_reads' } },
{ data: { source: 'p4', target: 'p6'} },
{ data: { source: 'p4', target: 'p5'} },
{ data: { source: 'p6', target: 'p7', label: 'ch_fastq_reports' } },
{ data: { source: 'p8', target: 'p9', label: 'ref_genome' } },
{ data: { source: 'p9', target: 'p10', label: 'ch_bwa_idx' } },
{ data: { source: 'p10', target: 'p11'} },
{ data: { source: 'p10', target: 'p12'} },
{ data: { source: 'p10', target: 'p13'} },
{ data: { source: 'p11', target: 'p14', label: 'ch_bwa_out_bam' } },
{ data: { source: 'p12', target: 'p15', label: 'ch_bwa_out_bai' } },
{ data: { source: 'p13', target: 'p19', label: 'ch_bwa_out_count' } },
{ data: { source: 'p14', target: 'p16'} },
{ data: { source: 'p15', target: 'p16'} },
{ data: { source: 'p16', target: 'p17'} },
{ data: { source: 'p11', target: 'p19', label: 'ch_bwa_out_bam' } },
{ data: { source: 'p12', target: 'p19', label: 'ch_bwa_out_bai' } },
{ data: { source: 'p1', target: 'p19', label: 'ch_metadata' } },
{ data: { source: 'p18', target: 'p19', label: 'gff' } },
{ data: { source: 'p19', target: 'p24', label: 'ch_readcounts_df' } },
{ data: { source: 'p19', target: 'p23', label: 'ch_readcounts_df_pc' } },
{ data: { source: 'p19', target: 'p22'} },
{ data: { source: 'p19', target: 'p24', label: 'ch_refgene_df' } },
{ data: { source: 'p19', target: 'p21'} },
{ data: { source: 'p19', target: 'p20'} },
{ data: { source: 'p24', target: 'p26', label: 'ch_cpm_counts' } },
{ data: { source: 'p24', target: 'p25', label: 'ch_rpkm_counts' } },
{ data: { source: 'p1', target: 'p26', label: 'ch_metadata' } },
{ data: { source: 'p26', target: 'p27', label: 'ch_pca_out' } },
{ data: { source: 'p19', target: 'p31', label: 'ch_readcounts_df' } },
{ data: { source: 'p1', target: 'p31', label: 'ch_metadata' } },
{ data: { source: 'p28', target: 'p31', label: 'cont_tabl' } },
{ data: { source: 'p29', target: 'p31', label: 'p_thresh' } },
{ data: { source: 'p30', target: 'p31', label: 'l2fc_thresh' } },
{ data: { source: 'p31', target: 'p33'} },
{ data: { source: 'p31', target: 'p32'} },
{ data: { source: 'p33', target: 'p34', label: 'ch_deseq_res' } },
],
},

                });

            });
        </script>
    </head>

    <body>
        <h1>Nextflow Cytoscape.js with Dagre</h1>
        <div id="cy"></div>
    </body>

</html>
